<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transfer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
        }

        .uploader {
            background: #fff;
            padding: 2em;
            border-radius: 0.5em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input[type="file"] {
            margin-bottom: 1em;
        }

        button {
            padding: 0.5em 1.5em;
            border: none;
            border-radius: 0.5em;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #status {
            margin-top: 1em;
            color: #555;
        }

        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 0.5em;
            overflow: hidden;
            margin-top: 1em;
            height: 1em;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #28a745;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div class="uploader">
        <h1>Transfer</h1>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload</button>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="status"></p>
    </div>

    <script>
        const ws = new WebSocket("wss://" + location.hostname + (location.port ? ":"+location.port : "") + "/upload");

        ws.onmessage = (event) => {
            document.getElementById("status").innerText = event.data;
        };

        function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) {
                alert("Please select a file");
                return;
            }

            // Reset progress
            const progressBar = document.getElementById("progressBar");
            progressBar.style.width = "0%";

            // Send filename first
            ws.send(file.name);

            const chunkSize = 16 * 1024; // 16KB
            let offset = 0;
            const reader = new FileReader();

            reader.onload = (e) => {
                ws.send(e.target.result);
                offset += chunkSize;

                // Update progress
                const percent = Math.min((offset / file.size) * 100, 100);
                progressBar.style.width = percent + "%";

                if (offset < file.size) {
                    readNextChunk();
                } else {
                    ws.send("EOF");
                }
            };

            function readNextChunk() {
                const slice = file.slice(offset, offset + chunkSize);
                reader.readAsArrayBuffer(slice);
            }

            readNextChunk();
        }
    </script>
</body>
</html>
