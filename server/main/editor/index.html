  <script src="https://unpkg.com/monaco-go/dist/monaco.contribution.js"></script>
  <script>
    require.config({ paths: { 'vs': 'https://unpkg.com/monaco-editor@latest/min/vs' } });

    document.body.classList.add("theme-dark","disable-error")
    const FileEditor = {}
    FileEditor.root = function(){
      let path = location.pathname.split("/editor/root")
      path.shift()
      return path.join("")
    }
    FileEditor.base = function(){
      let path = location.pathname.split("/editor/root")
      return path.shift() + "/editor"
    }
    
    FileEditor.reload = function(){
      documenter.post(FileEditor.base(),{"tree":FileEditor.root()}).then(e=>e.json()).then(e=>{
        FileEditor.TreeView.Render(e)
      })
    }
    FileEditor.reload();

    FileEditor.TreeView = {}
    FileEditor.TreeView.Render = function(data){
      FileEditor.TreeView.files = data
      FileEditor.TreeView.tree  = FileEditor.TreeView.BuildTree(data)
      for(let i=0;i<FileEditor.root().split("/").filter(e=>e.trim()!="").length;i++){
        FileEditor.TreeView.tree = FileEditor.TreeView.tree.children[0]
      }
      $("#FileEditor-TreeView").empty();
      $("#FileEditor-TreeView").appendChild( FileEditor.TreeView.Render.Item(FileEditor.TreeView.tree) )
    }

    FileEditor.TreeView.Icons = {
      "dir": documenter.render(`<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h207q16 0 30.5 6t25.5 17l57 57h320q33 0 56.5 23.5T880-640v400q0 33-23.5 56.5T800-160H160Zm0-80h640v-400H447l-80-80H160v480Zm0 0v-480 480Z"/></svg>`),
      "file": documenter.render(`<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h287q16 0 30.5 6t25.5 17l194 194q11 11 17 25.5t6 30.5v447q0 33-23.5 56.5T720-80H240Zm280-560v-160H240v640h480v-440H560q-17 0-28.5-11.5T520-640ZM240-800v200-200 640-640Z"/></svg>`),
      "plusFolder": documenter.render(`<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M560-320h80v-80h80v-80h-80v-80h-80v80h-80v80h80v80ZM160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h240l80 80h320q33 0 56.5 23.5T880-640v400q0 33-23.5 56.5T800-160H160Zm0-80h640v-400H447l-80-80H160v480Zm0 0v-480 480Z"/></svg>`),
      "plusFile": documenter.render(`<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M440-240h80v-120h120v-80H520v-120h-80v120H320v80h120v120ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg>`),
    }

    FileEditor.TreeView.Render.Item = function(data,depth=0){
      let parent = document.createElement("div")
      parent.style.setProperty("--depth",depth)

      let title = document.createElement("div")
      title.classList.add("flex-x","center","FileEditor-TreeView-Title")
      if(data.type=="file") title.classList.add("hover")
      title.setAttribute("type",data.type)
      title.setAttribute("path",data.path)
      title.setAttribute("ext",data.path.split(".").pop())
      
      let icon = document.createElement("div")
      icon.classList.add("FileEditor-TreeView-Title-Icon")
      if(data.type=="dir"){
        icon.appendChild(FileEditor.TreeView.Icons.dir.cloneNode(true))
      }else{
        icon.appendChild(FileEditor.TreeView.Icons.file.cloneNode(true))
      }
      title.appendChild(icon)
      
      let text   = document.createElement("div")
      text.classList.add("space")
      text.textContent = data.name
      title.appendChild(text)


      /*
      if(data.type=="dir"){
        let plusFolder = document.createElement("div")
        plusFolder.appendChild(FileEditor.TreeView.Icons.plusFolder.cloneNode(true))
        plusFolder.setAttribute("over","")
        title.appendChild(plusFolder)

        let plusFile = document.createElement("div")
        plusFile.appendChild(FileEditor.TreeView.Icons.plusFile.cloneNode(true))
        plusFile.setAttribute("over","")
        title.appendChild(plusFile)
      }
      */
      

      

      let children = document.createElement("div")
      children.classList.add("FileEditor-TreeView-Children")
      parent.appendChild(title)
      parent.appendChild(children)

      data.children=data.children.sort((a,b)=>{
        if (a.type === "dir" && b.type === "file") return -1;
        if (a.type === "file" && b.type === "dir") return 1;
        if(a.name<b.name) return -1;
        if(a.name>b.name) return 1;
        return 0;
      })


      data.children.map(e=>{
        children.appendChild(FileEditor.TreeView.Render.Item(e,depth+1))
      })
      return parent
    }


    FileEditor.TreeView.BuildTree = function(data,path){
      const root = {
        name:"root",
        type:"dir",
        children:[]
      };
      for(const item of data){
        const parts = item.path.split("/").filter(Boolean);
        let current = root;
        parts.forEach((part,index)=>{
          const isLast = index === parts.length - 1;
          let existing = current.children.find(x => x.name === part);
          if(!existing){
            existing = { name:part, type:isLast ? item.type : "dir", children:[], path: item.path};
            current.children.push(existing);
          }
          current = existing;
        });
      }
      return root;
    }


    FileEditor.TreeView.BuildTree = function(data, path) {
      const root = {
        name: "root",
        type: "dir",
        children: [],
        path: ""
      };
      for (const item of data) {
        const parts = item.path.split("/").filter(Boolean);
        let current = root;
        let currentPath = "";
        parts.forEach((part, index) => {
          const isLast = index === parts.length - 1;
          currentPath += "/" + part;
          let existing = current.children.find(x => x.name === part);
          if (!existing) {
            existing = {
              name: part,
              type: isLast ? item.type : "dir",
              children: [],
              path: currentPath
            };
            current.children.push(existing);
          }
          current = existing;
        });
      }
      return root;
    };

    window.editors = {}
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    
    documenter.on("click","[type=file]",function(){
      let menuItem = this
      let path = this.getAttribute("path")
      if(editors[path]){
        $("middle").empty()
        $("middle").appendChild(editors[path]._domElement)
        editor = editors[path]
        menuItem.classList.add("FileEditor-TreeView-Title-Opened")
        $$(".FileEditor-TreeView-Title-Current").map(e=>e.classList.remove("FileEditor-TreeView-Title-Current"))
        menuItem.classList.add("FileEditor-TreeView-Title-Current")
        return
      }
      documenter.post(FileEditor.base(),{"cat":path}).then(e=>e.text()).then(e=>{
        let code = e
        let language = path.split(".").pop()
        if(language=="js") language="javascript"
        let element = document.createElement("div")
        element.classList.add("full")
        $("middle").empty()
        $("middle").appendChild(element)
        let editor = monaco.editor.create(element, {
          value: code,
          language: language,
          tabSize: 2,
          automaticLayout: true,
          theme: 'master-'+(document.body.classList.contains("theme-dark")?"dark":"light"),
          fontSize: 12,
          fontFamily: 'JetBrains Mono',
          renderLineHighlight: "none",
        });
        menuItem.classList.add("FileEditor-TreeView-Title-Opened")
        $$(".FileEditor-TreeView-Title-Current").map(e=>e.classList.remove("FileEditor-TreeView-Title-Current"))
        menuItem.classList.add("FileEditor-TreeView-Title-Current")
        editor.path = path
        window.addEventListener('resize', () => { editor.layout(); });
        editors[path]=editor
        window.editor = editor
      })
    })
    window.addEventListener("keydown",function(event){
      console.log(event)
      if(event.ctrlKey && event.keyCode==83){
        //
        documenter.post(FileEditor.base(),{"save":editor.path,"data":Encode(editor.getValue())})
        event.preventDefault();
        return false;
      }
    })


    const Encode = function(content){ return btoa(unescape(encodeURIComponent(content))) }

    FileEditor.Helper = {}
    FileEditor.Helper.reload = function(){
      $("#Panel-Content").empty();
      let hints     = Helper.Hints(Helper.Codes())
      let hacks     = FileEditor.Helper.hacks = Helper.Hacks(Helper.Codes())
      let tasks     = FileEditor.Helper.tasks = Helper.Tasks(Helper.Codes())
      let clasess   = Helper.Go.Classes(Helper.Codes())
      let globals   = FileEditor.Helper.globals = Helper.Go.GlobalVariables(Helper.Codes())
      let locals    = FileEditor.Helper.locals  = Helper.Go.LocalVariables()
      let functions = Helper.Go.Functions(Helper.Codes())

      let fields    = FileEditor.Helper.fields = Helper.Go.Fields(Helper.Codes())



      for(let index in hacks.sort((a,b)=>a.title.localeCompare(b.title))){
        let element    = document.createElement("div")
        element.textContent = hacks[index].title
        element.classList.add("Helper-Hack","hover")
        element.setAttribute("focus-path",hacks[index].path)
        element.setAttribute("focus-line",hacks[index].line)
        $("#Panel-Content").appendChild(element)
      }

      for(let index in tasks.sort((a,b)=>a.title.localeCompare(b.title))){
        let element    = document.createElement("div")
        element.textContent = tasks[index].title
        element.classList.add("Helper-Task","hover")
        element.setAttribute("focus-path",tasks[index].path)
        element.setAttribute("focus-line",tasks[index].line)
        $("#Panel-Content").appendChild(element)
      }

      for(let index in hints){
        let element    = document.createElement("div")
        element.textContent = hints[index].title.trim()
        element.classList.add("Helper-Hint","hover")
        element.setAttribute("focus-path",hints[index].path)
        element.setAttribute("focus-line",hints[index].line)
        $("#Panel-Content").appendChild(element)
      }
      


      for(let name in globals){
        let element    = document.createElement("div")
        element.textContent = name + "->"+globals[name].type
        element.classList.add("Helper-Global-Variable","hover")
        element.setAttribute("focus-path",globals[name].path)
        element.setAttribute("focus-line",globals[name].line)
        
        $("#Panel-Content").appendChild(element)
      }


      for(let name in clasess){
        let element    = document.createElement("div")
        element.textContent = name + " {}"
        element.classList.add("Helper-Class","hover")
        element.setAttribute("focus-path",clasess[name].path)
        element.setAttribute("focus-line",clasess[name].line)
        
        $("#Panel-Content").appendChild(element)
      }

      for(let name in functions){
        let parameters = functions[name].parameters
        let returns    = functions[name].returns
        let element    = document.createElement("div")
        element.textContent = name + "("+parameters.join(",")+")->" + returns.join(",")
        if(returns.length==0){
          element.textContent = name + "("+parameters.join(",")+")"
        }
        element.classList.add("Helper-Function","hover")
        element.setAttribute("focus-path",functions[name].path)
        element.setAttribute("focus-line",functions[name].line)
        $("#Panel-Content").appendChild(element)
      }
    }
    setInterval(FileEditor.Helper.reload,2000)

    FileEditor.Focus = function(path,line){
      $("middle").empty()
      $("middle").appendChild(editors[path]._domElement)
      editor = editors[path]
      $(".FileEditor-TreeView-Title[path='"+path+"']").classList.add("FileEditor-TreeView-Title-Opened")
      $$(".FileEditor-TreeView-Title-Current").map(e=>e.classList.remove("FileEditor-TreeView-Title-Current"))
      $(".FileEditor-TreeView-Title[path='"+path+"']").classList.add("FileEditor-TreeView-Title-Current") 


      flashLine(editor, line);
      editor.revealLineInCenter(line);
      //editor.setPosition({ line, column: 1 });
      //editor.focus();
      
    }
    documenter.on("pointerdown","[focus-path]",function(e){
      FileEditor.Focus(this.getAttribute("focus-path"),parseInt(this.getAttribute("focus-line")))
      e.preventDefault()
      return false;
    })

    function flashLine(editor, lineNumber, duration = 1500) {
      const decorations = editor.deltaDecorations([], [{ range: new monaco.Range(lineNumber, 1, lineNumber, 1), options: { isWholeLine: true, className: 'flash-line' }}]);
      setTimeout(() => { editor.deltaDecorations(decorations, []); }, duration);
    }

  </script>

<script>


const Helper = {Go:{}}

Helper.Hints = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    lines.forEach((statement,line) => {
      let match = statement.match(/\s*\/\/\@(.*)/);
      if (match) {
        response.push({title:match[1].trim(),path,line:line+1});
      }
    });
  }
  return response;
}

Helper.Hacks = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    lines.forEach((statement,line) => {
      let match = statement.match(/\s*\/\/\!(.*)/);
      if (match) {
        response.push({title:match[1].trim(),path,line:parseInt(line+1)});
      }
    });
  }
  return response;
}


Helper.Tasks = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    lines.forEach((statement,line) => {
      let match = statement.match(/\s*\/\/\-(.*)/);
      if (match) {
        response.push({title:match[1].trim(),path,line:line+1});
      }
    });
  }
  return response;
}




Helper.Codes = function(){
  return Object.fromEntries(Object.values(editors).map(e=>[e.path,e.getValue()] ))
}

Helper.Code = function(){
  if(editor==null){
    return {code:"",position:{line:0,column:0}}
  }
  const position = editor.getPosition();
  return{ code:editor.getValue(), path: editor.path, position:{line:position.lineNumber,column:position.column}}
}

Helper.Go.Functions = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    let commentLevel = 0;
    lines.forEach((statement,line) => {
      if(commentLevel==0 && !statement.trim().startsWith("//")){
        let match = statement.match(/func\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(([^)]*)\)\s*(\([^)]*\)|[A-Za-z0-9_\*\[\]]+)?/);
        if (match) {
          let name = match[1];
          let params = match[2] ? match[2].split(",").map(e => e.trim()).filter(Boolean).map(e => e.split(/\s+/).join(":")) : [];
          let returns = [];
          if (match[3]) {
            let ret = match[3].trim();
            if (ret.startsWith("(")) {
              ret = ret.slice(1, -1);
              returns = ret.split(",").map(e => e.trim()).filter(Boolean);
            } else {
              returns = [ret];
            }
          }
          response[name] = {parameters: params, returns: returns, name, line: line+1,path};
        }
      }
      commentLevel += (statement.match(/\/\*/g) || []).length;
      commentLevel -= (statement.match(/\*\//g) || []).length;
    });
  }
  return response;
};


Helper.Go.Variables = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");

    lines.forEach((line) => {
      let match = line.match(/([a-zA-Z0-9_]*)\s*\:\=/);
      if (match) {
        response.push(match[1]);
      }
      match = line.match(/var ([a-zA-Z0-9_]*)\s*/);
      if (match) {
        response.push(match[1]);
      }
    });

  }
  response = [...new Set(response)];
  return response;
}


Helper.Go.GlobalVariables = function(codes){
  let response = [];
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    let braceLevel = 0;
    let commentLevel = 0;
    let varBlock = false;
    lines.forEach((statement,line) => {
      let trimmed = statement.trim();
      if(commentLevel==0 && !trimmed.startsWith("//")){

        // var ( ... ) başlangıcı
        if(braceLevel == 0 && trimmed.match(/^var\s*\($/)){
          varBlock = true;
        }

        // var block bitişi
        if(varBlock && trimmed == ")"){
          varBlock = false;
        }

        // sadece global scope
        if(braceLevel==0){

          // x := ...
          let match = statement.match(/([a-zA-Z0-9_]+)\s*\:\=/);
          if (match) {
            response[match[1]] = {name: match[1],path,line: line+1};
          }

          // tek satır normal var
          // var x Type
          match = statement.match(/var\s+([a-zA-Z0-9_]+)\s+([a-zA-Z0-9_\*\[\]\.]+)/);
          if (match) {
            response[match[1]] = {name: match[1],path,line: line+1,type: match[2]};
          }

          // var block içi:
          // room Room = Room{
          if(varBlock){
            match = statement.match(/^\s*([a-zA-Z0-9_]+)\s+([a-zA-Z0-9_\*\[\]\.]+)/);
            if(match){
              response[match[1]] = {name: match[1],path,line: line+1,type: match[2]};
            }
          }
        }
      }
      commentLevel += (statement.match(/\/\*/g) || []).length;
      commentLevel -= (statement.match(/\*\//g) || []).length;
      braceLevel += (statement.match(/{/g) || []).length;
      braceLevel -= (statement.match(/}/g) || []).length;
    });
  }
  delete(response[""])
  return response;
}



Helper.Go.LocalVariables = function(){
  const data = Helper.Code();
  const code     = data.code;
  const path     = data.path;
  const position = data.position;
  let line = position.line-1
  const lines = code.split("\n");
  let braceLevel = 0;  //. -1 <> +1
  let response = {}
  let skipBrace = null

  let match
  for(;line>0;line--){
    let statement = lines[line]
    //braceLevel += (statement.match(/\bselect\b/g) || []).length;
    let minusBrace = (statement.match(/{/g) || []).length;
    let plusBrace  = (statement.match(/}/g) || []).length;

    if(braceLevel<0 && (plusBrace-minusBrace)>0){
      skipBrace = Math.min(skipBrace,braceLevel)
    }
    braceLevel+= plusBrace-minusBrace
    
    if(braceLevel==skipBrace){
      skipBrace=null
    }

    //if(statement.trim()!="") console.log(line,statement,braceLevel,skipBrace)

    if(braceLevel<=0  && skipBrace==null){
      
      // var statement
      let match = statement.match(/^\s*var\s+([a-zA-Z_][a-zA-Z0-9_]*(?:\s*,\s*[a-zA-Z_][a-zA-Z0-9_]*)*)\s+(\*?[a-zA-Z_][a-zA-Z0-9_]*)/);
      if (match && !statement.trim().startsWith("for ")) {
        let names = match[1];
        let type = match[2];
        names.split(",").map(e => e.trim()).forEach(e => {
            response[e] = {name: e,type: type,path,line: line + 1};
        });
      }

      //  := statement
      match = statement.match(/([a-zA-Z_][a-zA-Z0-9_]*(?:\s*,\s*[a-zA-Z_][a-zA-Z0-9_]*)*)\s*:=\s*(.+)/);
      if(match && !statement.trim().startsWith("for ")){
        let name = match[1]
        name.split(",").map(e=>e.trim()).map(e=>{
          response[e] = {name: e, path,line:line+1}
        })
      }


      // parametre ve yapı alımı
      match = statement.match(/func\s*(?:\(([^)]+)\)\s*)?([a-zA-Z_]\w*)\s*\(([^)]*)\)/);
      if(match){
        let receiver = match[1]; // "c *Connection"
        let params = match[3];    // "param string"
        if (receiver) {
          let [recvName, recvType] = receiver.split(/\s+/).filter(Boolean);
          response[recvName] = {name: recvName, type: recvType,path,line: line + 1};
        }
        params.split(",").map(e=>e.trim()).filter(Boolean).map(e=>{
          let p = e.split(/\s+/)
          response[p[0]] = {name:p[0],type:p[1],path,line:line+1}
        })
      }
    }
    
    if(statement.match(/\bcase\b|\bdefault\b/g)){
      skipBrace = Math.min(skipBrace,braceLevel-1)
    }
  }
  delete(response["_"])
  return response
}

Helper.Go.Classes = function(codes){
  let response = {};
  for(let path in codes){
    let code  = codes[path]
    let lines = code.split("\n");
    lines.forEach((statement,line) => {
      let match = statement.match(/type\s+([A-Za-z_][A-Za-z0-9_]*)\s+struct\s*/);
      if (match) {
        response[match[1]] = {name:match[1],path,line:line+1};
      }
    });
  }
  return response;
}


Helper.Go.Fields = function(codes){

  let response = {};

  for(let path in codes){

    let code  = codes[path];
    let lines = code.split("\n");

    let currentStruct = null;

    lines.forEach((statement, line) => {

      /*
      |--------------------------------------------------------------------------
      | STRUCT START
      |--------------------------------------------------------------------------
      */

      let structMatch = statement.match(
        /type\s+([A-Za-z_][A-Za-z0-9_]*)\s+struct\s*\{/
      );

      if(structMatch){

        currentStruct = structMatch[1];

        if(!response[currentStruct]){
          response[currentStruct] = {
            name   : currentStruct,
            path,
            line   : line + 1,
            fields : [],
            methods: {}
          };
        }

        return;
      }

      /*
      |--------------------------------------------------------------------------
      | STRUCT END
      |--------------------------------------------------------------------------
      */

      if(currentStruct && /^\s*\}\s*$/.test(statement)){
        currentStruct = null;
      }

      /*
      |--------------------------------------------------------------------------
      | FIELD
      |--------------------------------------------------------------------------
      */

      if(currentStruct){

        let fieldMatch = statement.match(
          /^\s*([A-Za-z_][A-Za-z0-9_]*)\s+([^\s`]+)\s*(?:`([^`]*)`)?/
        );

        if(fieldMatch){

          response[currentStruct].fields.push({
            name : fieldMatch[1],
            type : fieldMatch[2],
            tag  : fieldMatch[3] || null,
            line : line + 1,
            path
          });
        }
      }

      /*
      |--------------------------------------------------------------------------
      | METHOD (ONLY STRUCT METHODS)
      |--------------------------------------------------------------------------
      */

      let methodMatch = statement.match(
        /^\s*func\s*\(([^)]+)\)\s*([A-Za-z_][A-Za-z0-9_]*)\s*\(([^)]*)\)\s*([^{]*)/
      );

      if(!methodMatch) return;

      let receiver   = methodMatch[1];
      let name       = methodMatch[2];
      let paramsRaw  = methodMatch[3].trim();
      let returnsRaw = methodMatch[4].trim();

      /*
      |--------------------------------------------------------------------------
      | EXTRACT RECEIVER TYPE
      |--------------------------------------------------------------------------
      */

      let receiverTypeMatch = receiver.match(
        /(?:\*\s*)?([A-Za-z_][A-Za-z0-9_]*)$/
      );

      let receiverType = receiverTypeMatch?.[1];

      if(!receiverType){
        return;
      }

      /*
      |--------------------------------------------------------------------------
      | PARSE PARAMETERS
      |--------------------------------------------------------------------------
      */

      let parameters = [];

      if(paramsRaw){

        paramsRaw.split(",").forEach(p => {

          p = p.trim();
          if(!p) return;

          let parts = p.split(/\s+/);

          if(parts.length >= 2){
            parameters.push({
              name: parts[0],
              type: parts.slice(1).join(" ")
            });
          } else {
            parameters.push({
              name: null,
              type: parts[0]
            });
          }
        });
      }

      /*
      |--------------------------------------------------------------------------
      | PARSE RETURNS
      |--------------------------------------------------------------------------
      */

      let returns = [];

      if(returnsRaw){

        returnsRaw = returnsRaw
          .replace(/^\(/, "")
          .replace(/\)$/, "")
          .trim();

        if(returnsRaw){
          returns = returnsRaw
            .split(",")
            .map(x => x.trim())
            .filter(Boolean);
        }
      }

      /*
      |--------------------------------------------------------------------------
      | ENSURE STRUCT EXISTS (CROSS FILE SAFE)
      |--------------------------------------------------------------------------
      */

      if(!response[receiverType]){

        response[receiverType] = {
          name   : receiverType,
          path,
          line   : line + 1,
          fields : [],
          methods: {}
        };
      }

      /*
      |--------------------------------------------------------------------------
      | ATTACH METHOD
      |--------------------------------------------------------------------------
      */

      response[receiverType].methods[name] = {
        name,
        path,
        line: line + 1,
        parameters,
        returns
      };

    });
  }

  return response;
}

    }))

    functions = Object.keys(functions).map(e => ({
      label: e, insertText: e ,  
      range: range, kind: monaco.languages.CompletionItemKind.Function, sortText : "3",
    }))

    globals = Object.keys(globals).map(e => ({
      label: e, insertText: e,
      range: range, kind: monaco.languages.CompletionItemKind.Variable, sortText : "2",
    }))


    /*
    parameters = parameters.map(e => ({

    }))
    */

    classes = Object.keys(classes).map((e) => ({

    }));


    let keywords = [
      "int","string","double",
      "if","else","for","return","func","var","const","struct","interface",
      "switch","case","defer","go","map","chan","package","import"] //,"import","from","as","class","try","except","finally","with","assert","global","nonlocal","lambda","del","yield","in","is","not","and","or","as","True","False","None"]
    keywords = keywords.map(e=>({
      label:e,

      documentaion:"Standart anahtar kelimeler",
      sortText:"9"
    }))



    console.log([...functions, ...globals, ...locals, ...parameters,...classes,...keywords])
    return [...functions, ...globals, ...locals, ...parameters,...classes,...keywords]

  }



  function FixType(type){
    if(type.trim().startsWith("*")){
      return type.trim().substr(1)
    }
    return type
  }
  
  monaco.languages.registerCompletionItemProvider('go', {
    triggerCharacters: ['.'],
    provideCompletionItems: function (model, position) {
      

      const lineContent = model.getLineContent(position.lineNumber);
      const objectMatch = lineContent.slice(0, position.column - 1).match(/([a-zA-Z_][a-zA-Z0-9_]*)\.[a-zA-Z0-9_]*$/);

      if (objectMatch) {
        const objectName = objectMatch[1];
        if( FileEditor.Helper.globals[objectName] ){
          let type    = FixType(FileEditor.Helper.globals[objectName].type)
          let fields  = FileEditor.Helper.fields[type].fields
          let methods = Object.values(FileEditor.Helper.fields[type].methods)
          fields  = fields.map(f=>({label:f.name,insertText:f.name,kind:monaco.languages.CompletionItemKind.Field,sortText:"4"}))
          methods = methods.map(f=>({label:f.name,insertText:f.name,kind:monaco.languages.CompletionItemKind.Function,sortText:"5"}))
          return {suggestions:[...fields,...methods]}
        }else if( FileEditor.Helper.locals[objectName] ){
          let type    = FixType(FileEditor.Helper.locals[objectName].type)
          let fields  = FileEditor.Helper.fields[type].fields
          let methods = Object.values(FileEditor.Helper.fields[type].methods)
          fields  = fields.map(f=>({label:f.name,insertText:f.name,kind:monaco.languages.CompletionItemKind.Field,sortText:"4"}))
          methods = methods.map(f=>({label:f.name,insertText:f.name,kind:monaco.languages.CompletionItemKind.Function,sortText:"5"}))
          return {suggestions:[...fields,...methods]}
        }else{
          return null
        }
        
      }
      
      var word = model.getWordUntilPosition(position);
      var range = {
        startLineNumber: position.lineNumber,
        endLineNumber: position.lineNumber,
        startColumn: word.startColumn,
        endColumn: word.endColumn
      };
      return {
        suggestions: createDependencyProposals(range, model.getValue())
      };
    },
  })


})
